<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK's Beauty Tracker</title>
    
    <!-- iPhone App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AK Beauty">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDrgkzunwKPVNFOpZrWCr0qT_LswsX1AkA",
            authDomain: "ak-beauty-tracker.firebaseapp.com",
            projectId: "ak-beauty-tracker",
            storageBucket: "ak-beauty-tracker.firebasestorage.app",
            messagingSenderId: "685732538379",
            appId: "1:685732538379:web:8ce073de523baac502bf0e"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Export to window for access in standard scripts
        window.db = db;
        window.fs = { collection, addDoc, onSnapshot, query, deleteDoc, doc, setDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdf2f8; font-size: 1.25rem; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); padding: 2rem; margin-bottom: 2rem; }
        .btn { padding: 1rem 2rem; border-radius: 1rem; font-weight: 700; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; gap: 0.5rem; }
        .btn-pink { background-color: #ec4899; color: white; }
        .btn-pink:active { transform: scale(0.95); }
        .btn-outline { border: 2px solid #ec4899; color: #ec4899; background: white; }
        .input-field { width: 100%; padding: 1rem; border: 2px solid #f9a8d4; border-radius: 1rem; font-size: 1.25rem; margin-top: 0.5rem; outline: none; background: white; }
        .input-field:focus { border-color: #ec4899; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf2f8; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .receipt-preview { max-width: 65px; max-height: 65px; object-fit: cover; border-radius: 0.5rem; border: 2px solid #f9a8d4; cursor: pointer; }
        .sync-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #10b981; margin-right: 5px; }
    </style>
</head>
<body class="pb-20 p-4 md:p-8">

    <!-- Login/Sync Key Screen -->
    <div id="loginOverlay">
        <div class="card w-full max-w-md text-center">
            <h1 class="text-4xl font-black text-pink-600 mb-4">AK'S BEAUTY</h1>
            <p class="text-gray-500 font-bold mb-8 uppercase tracking-widest text-sm">Cloud Data Sync</p>
            <div class="text-left mb-6">
                <label class="block font-black text-gray-400 uppercase text-[10px] mb-1">Your Business Sync Key</label>
                <input type="text" id="businessKeyInput" class="input-field text-center" placeholder="e.g. ak-beauty-2024">
            </div>
            <button onclick="login()" class="btn btn-pink w-full py-4 text-xl">CONNECT CLOUD</button>
            <p class="text-xs text-gray-400 mt-6 italic">Enter a unique key. Use the SAME key on both phones to sync data.</p>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="modal" onclick="this.style.display='none'">
        <div class="absolute top-10 right-5 text-white bg-pink-600 px-6 py-3 rounded-full font-bold cursor-pointer shadow-lg">CLOSE X</div>
        <img id="modalImg" src="" style="max-width: 95%; max-height: 80%; border-radius: 1rem;">
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="text-center mt-6 mb-10">
            <h1 class="text-5xl font-black text-pink-600 tracking-tighter mb-2">AK'S BEAUTY</h1>
            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center text-sm text-green-600 font-bold">
                    <span class="sync-indicator"></span> CLOUD SYNC ACTIVE
                </div>
                <div class="flex gap-2">
                    <button onclick="downloadExcel()" class="btn btn-outline text-sm py-2 px-4 shadow-sm">EXCEL REPORT</button>
                    <button onclick="logout()" class="btn btn-outline text-sm py-2 px-4 border-gray-300 text-gray-400">LOGOUT</button>
                </div>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card border-l-[12px] border-green-500 mb-0">
                <p class="text-gray-400 font-bold uppercase text-xs tracking-wider">Total Sales</p>
                <p id="totalSales" class="text-4xl font-black text-green-600">$0.00</p>
            </div>
            <div class="card border-l-[12px] border-red-500 mb-0">
                <p class="text-gray-400 font-bold uppercase text-xs tracking-wider">Expenses</p>
                <p id="totalExpenses" class="text-4xl font-black text-red-600">$0.00</p>
            </div>
            <div class="card border-l-[12px] border-pink-500 bg-pink-50 mb-0">
                <p class="text-pink-400 font-bold uppercase text-xs tracking-wider">Profit</p>
                <p id="netProfit" class="text-4xl font-black text-pink-600">$0.00</p>
            </div>
        </div>

        <!-- Entry Form -->
        <div class="card border-2 border-pink-100">
            <h2 class="text-3xl font-bold mb-8 text-gray-800">Add Entry</h2>
            <form id="financeForm" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div>
                        <label class="block font-black text-gray-600 uppercase text-xs">Date</label>
                        <input type="date" id="txDate" class="input-field bg-pink-50" required>
                    </div>
                    <div>
                        <label class="block font-black text-gray-600 uppercase text-xs">Type</label>
                        <select id="type" class="input-field bg-pink-50">
                            <option value="income">💰 Sale</option>
                            <option value="expense">💸 Expense</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-black text-gray-600 uppercase text-xs">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" class="input-field" placeholder="0.00" required>
                    </div>
                </div>
                <div>
                    <label class="block font-black text-gray-600 uppercase text-xs">Description</label>
                    <input type="text" id="description" class="input-field" placeholder="Client Name or Service" required>
                </div>
                <div class="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-pink-200">
                    <label class="block font-black text-pink-600 uppercase text-xs mb-2">Receipt Photo</label>
                    <input type="file" id="receipt" accept="image/*" class="text-sm">
                </div>
                <button type="submit" id="saveBtn" class="btn btn-pink w-full text-2xl py-6 shadow-lg">SAVE TO CLOUD</button>
            </form>
        </div>

        <!-- History -->
        <div class="card overflow-hidden border-2 border-gray-100">
            <h2 class="text-3xl font-bold text-gray-800 mb-8">Cloud History</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b-4 border-pink-50 text-gray-400 uppercase text-xs">
                            <th class="pb-4 px-2">Date</th>
                            <th class="pb-4 px-2">Details</th>
                            <th class="pb-4 px-2">Receipt</th>
                            <th class="pb-4 px-2 text-right">Amount</th>
                            <th class="pb-4 px-2 text-center">Del</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let transactions = [];
        let businessKey = localStorage.getItem('ak_business_key');
        let unsubscribe = null;

        function login() {
            const key = document.getElementById('businessKeyInput').value.trim().toLowerCase();
            if (!key) return alert("Please enter a key");
            businessKey = key;
            localStorage.setItem('ak_business_key', key);
            document.getElementById('loginOverlay').style.display = 'none';
            startSync();
        }

        function logout() {
            if(confirm("Logout from cloud?")) {
                localStorage.removeItem('ak_business_key');
                location.reload();
            }
        }

        if (businessKey) {
            document.getElementById('loginOverlay').style.display = 'none';
            window.onload = () => { 
                if (window.db) startSync();
                else setTimeout(startSync, 2000); 
            };
        }

        function startSync() {
            if (!window.db || !businessKey) return;
            const q = window.fs.collection(window.db, "businesses", businessKey, "transactions");
            unsubscribe = window.fs.onSnapshot(q, (snapshot) => {
                transactions = [];
                snapshot.forEach((doc) => { transactions.push({ id: doc.id, ...doc.data() }); });
                updateUI();
            }, (error) => {
                console.error("Sync Error:", error);
                alert("Cloud Connection Error. Check your Firebase Rules and Keys.");
            });
        }

        function updateUI() {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let sales = 0, expenses = 0;

            transactions.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(tx => {
                if(tx.type === 'income') sales += tx.amount; else expenses += tx.amount;
                const row = document.createElement('tr');
                row.className = "border-b border-gray-50";
                const displayDate = new Date(tx.date + 'T00:00:00').toLocaleDateString(undefined, {month:'short', day:'numeric'});
                row.innerHTML = `
                    <td class="py-6 px-2 text-sm font-bold text-gray-400">${displayDate}</td>
                    <td class="py-6 px-2"><div class="font-bold text-gray-800 text-base">${tx.description}</div><span class="text-[10px] font-black uppercase ${tx.type === 'income' ? 'text-green-600' : 'text-red-500'}">${tx.type}</span></td>
                    <td class="py-6 px-2">${tx.receipt ? `<img src="${tx.receipt}" class="receipt-preview" onclick="viewImage('${tx.receipt}')">` : '-'}</td>
                    <td class="py-6 px-2 text-right font-black text-2xl ${tx.type === 'income' ? 'text-green-600' : 'text-red-500'}">$${tx.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-6 px-2 text-center"><button onclick="deleteTransaction('${tx.id}')" class="text-red-400"><i data-lucide="trash-2"></i></button></td>
                `;
                list.appendChild(row);
            });

            document.getElementById('totalSales').innerText = `$${sales.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalExpenses').innerText = `$${expenses.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('netProfit').innerText = `$${(sales - expenses).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            lucide.createIcons();
        }

        async function deleteTransaction(docId) {
            if(confirm('Delete from Cloud?')) {
                await window.fs.deleteDoc(window.fs.doc(window.db, "businesses", businessKey, "transactions", docId));
            }
        }

        function viewImage(src) { document.getElementById('modalImg').src = src; document.getElementById('modal').style.display = 'flex'; }

        function downloadExcel() {
            let csv = "Date,Type,Description,Amount\n";
            transactions.forEach(t => csv += `${t.date},${t.type},"${t.description}",${t.amount}\n`);
            const link = document.createElement("a");
            link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
            link.download = "AK_Beauty_Report.csv";
            link.click();
        }

        document.getElementById('financeForm').onsubmit = async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "SAVING...";

            const file = document.getElementById('receipt').files[0];
            let base64 = null;
            if(file) base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });

            try {
                await window.fs.addDoc(window.fs.collection(window.db, "businesses", businessKey, "transactions"), {
                    date: document.getElementById('txDate').value,
                    type: document.getElementById('type').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    description: document.getElementById('description').value,
                    receipt: base64,
                    createdAt: Date.now()
                });
                e.target.reset();
                setToday();
            } catch (err) { alert("Cloud Error: " + err.message); }
            finally { saveBtn.disabled = false; saveBtn.innerText = "SAVE TO CLOUD"; }
        };

        function setToday() { document.getElementById('txDate').value = new Date().toISOString().split('T')[0]; }
        setToday();
        lucide.createIcons();
    </script>
</body>
</html>
