<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK's Beauty Tracker</title>
    
    <!-- iPhone App Meta Tags (Forces "Add to Home Screen" to appear) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AK Beauty">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdf2f8; 
            font-size: 1.25rem;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 0.5rem;
        }

        .btn-pink { background-color: #ec4899; color: white; }
        .btn-pink:active { transform: scale(0.95); }

        .btn-outline { border: 2px solid #ec4899; color: #ec4899; background: white; }

        .input-field {
            width: 100%;
            padding: 1rem;
            border: 2px solid #f9a8d4;
            border-radius: 1rem;
            font-size: 1.25rem;
            margin-top: 0.5rem;
            outline: none;
            background: white;
        }

        .input-field:focus { border-color: #ec4899; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .receipt-preview {
            max-width: 65px;
            max-height: 65px;
            object-fit: cover;
            border-radius: 0.5rem;
            border: 2px solid #f9a8d4;
            cursor: pointer;
        }
    </style>
</head>
<body class="pb-20 p-4 md:p-8">

    <div id="modal" onclick="this.style.display='none'">
        <div class="absolute top-10 right-5 text-white bg-pink-600 px-6 py-3 rounded-full font-bold cursor-pointer shadow-lg">CLOSE X</div>
        <img id="modalImg" src="" style="max-width: 95%; max-height: 80%; border-radius: 1rem;">
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="text-center mt-6 mb-10">
            <h1 class="text-5xl font-black text-pink-600 tracking-tighter mb-2">AK'S BEAUTY</h1>
            <div class="flex flex-col items-center gap-4">
                <p class="text-xl text-gray-500 font-bold uppercase tracking-[0.2em]">Business Finance Hub</p>
                <button onclick="downloadExcel()" class="btn btn-outline text-sm py-2 px-4 shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i> EXCEL REPORT
                </button>
            </div>
        </header>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 px-2 gap-4">
            <h2 class="text-2xl font-bold text-gray-800">Dashboard Totals</h2>
            <div class="flex items-center gap-2">
                <label class="font-bold text-gray-500 text-sm uppercase">Viewing:</label>
                <select id="monthFilter" onchange="changeFilter()" class="bg-white border-2 border-pink-300 rounded-xl px-4 py-2 font-bold text-pink-600 outline-none shadow-sm cursor-pointer">
                    <option value="all">📅 All Time</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card border-l-[12px] border-green-500 mb-0">
                <p class="text-gray-400 font-bold uppercase text-xs tracking-wider mb-1">Total Sales</p>
                <p id="totalSales" class="text-4xl font-black text-green-600">$0.00</p>
            </div>
            <div class="card border-l-[12px] border-red-500 mb-0">
                <p class="text-gray-400 font-bold uppercase text-xs tracking-wider mb-1">Total Expenses</p>
                <p id="totalExpenses" class="text-4xl font-black text-red-600">$0.00</p>
            </div>
            <div class="card border-l-[12px] border-pink-500 bg-pink-50 mb-0">
                <p class="text-pink-400 font-bold uppercase text-xs tracking-wider mb-1">Net Profit</p>
                <p id="netProfit" class="text-4xl font-black text-pink-600">$0.00</p>
            </div>
        </div>

        <div class="card border-2 border-pink-100">
            <h2 class="text-3xl font-bold mb-8 text-gray-800 flex items-center gap-3">
                <i data-lucide="plus-circle" class="text-pink-500"></i> New Entry
            </h2>
            <form id="financeForm" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div>
                        <label class="block font-black text-gray-600 uppercase text-sm tracking-widest">Date</label>
                        <input type="date" id="txDate" class="input-field bg-pink-50" required>
                    </div>
                    <div>
                        <label class="block font-black text-gray-600 uppercase text-sm tracking-widest">Type</label>
                        <select id="type" class="input-field bg-pink-50">
                            <option value="income">💰 Sale / Income</option>
                            <option value="expense">💸 Expense</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-black text-gray-600 uppercase text-sm tracking-widest">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" class="input-field" placeholder="0.00" required>
                    </div>
                </div>

                <div>
                    <label class="block font-black text-gray-600 uppercase text-sm tracking-widest">Description / Service</label>
                    <input type="text" id="description" class="input-field" placeholder="Client Name or Service" required>
                </div>

                <div class="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-pink-200">
                    <label class="block font-black text-pink-600 uppercase text-sm tracking-widest mb-2">Upload Receipt</label>
                    <input type="file" id="receipt" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-8 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-pink-600 file:text-white hover:file:bg-pink-700">
                </div>

                <button type="submit" class="btn btn-pink w-full text-2xl py-6 shadow-lg shadow-pink-200">
                    SAVE TRANSACTION
                </button>
            </form>
        </div>

        <div class="card overflow-hidden border-2 border-gray-100">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-3xl font-bold text-gray-800">History</h2>
                <button onclick="clearHistory()" class="flex items-center gap-2 text-red-500 font-bold hover:bg-red-50 px-4 py-2 rounded-xl transition-colors">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Reset All Data
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b-4 border-pink-50 text-gray-400 uppercase text-xs tracking-widest">
                            <th class="pb-4 px-2">Date</th>
                            <th class="pb-4 px-2">Details</th>
                            <th class="pb-4 px-2">Receipt</th>
                            <th class="pb-4 px-2 text-right">Amount</th>
                            <th class="pb-4 px-2 text-center">Remove</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('ak_beauty_tx')) || [];
        let currentFilter = 'all';

        function changeFilter() {
            currentFilter = document.getElementById('monthFilter').value;
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('transactionList');
            const monthFilterEl = document.getElementById('monthFilter');
            const totalSalesEl = document.getElementById('totalSales');
            const totalExpensesEl = document.getElementById('totalExpenses');
            const netProfitEl = document.getElementById('netProfit');

            const uniqueMonths = new Set();
            transactions.forEach(t => uniqueMonths.add(t.date.substring(0,7)));
            monthFilterEl.innerHTML = '<option value="all">📅 All Time</option>';
            Array.from(uniqueMonths).sort().reverse().forEach(m => {
                const [y, mm] = m.split('-');
                const name = new Date(y, mm-1).toLocaleString('default', { month: 'long', year: 'numeric' });
                monthFilterEl.innerHTML += `<option value="${m}" ${currentFilter === m ? 'selected' : ''}>${name}</option>`;
            });

            let filtered = transactions;
            if(currentFilter !== 'all') filtered = transactions.filter(t => t.date.substring(0,7) === currentFilter);
            
            list.innerHTML = '';
            let sales = 0, expenses = 0;

            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(tx => {
                if(tx.type === 'income') sales += tx.amount; else expenses += tx.amount;
                const row = document.createElement('tr');
                row.className = "border-b border-gray-50 hover:bg-pink-50/30 transition-colors";
                const displayDate = new Date(tx.date + 'T00:00:00').toLocaleDateString(undefined, {month:'short', day:'numeric', year: 'numeric'});
                row.innerHTML = `
                    <td class="py-6 px-2 text-sm font-bold text-gray-400">${displayDate}</td>
                    <td class="py-6 px-2"><div class="font-bold text-gray-800">${tx.description}</div><span class="px-3 py-1 rounded-full text-[10px] font-black tracking-tighter ${tx.type === 'income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} uppercase">${tx.type}</span></td>
                    <td class="py-6 px-2">${tx.receipt ? `<img src="${tx.receipt}" class="receipt-preview" onclick="viewImage('${tx.receipt}')">` : '<span class="text-gray-300 text-xs italic">N/A</span>'}</td>
                    <td class="py-6 px-2 text-right font-black text-2xl ${tx.type === 'income' ? 'text-green-600' : 'text-red-500'}">${tx.type === 'income' ? '' : '-'}$${tx.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-6 px-2 text-center"><button onclick="deleteTransaction(${tx.id})" class="text-red-400 hover:text-red-600"><i data-lucide="x-circle" class="w-8 h-8"></i></button></td>
                `;
                list.appendChild(row);
            });

            totalSalesEl.innerText = `$${sales.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalExpensesEl.innerText = `$${expenses.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            const profit = sales - expenses;
            netProfitEl.innerText = `$${profit.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            netProfitEl.className = `text-4xl font-black ${profit >= 0 ? 'text-pink-600' : 'text-red-600'}`;
            localStorage.setItem('ak_beauty_tx', JSON.stringify(transactions));
            lucide.createIcons();
        }

        function deleteTransaction(id) { if(confirm('Delete entry?')) { transactions = transactions.filter(t => t.id !== id); updateUI(); } }
        function clearHistory() { if(confirm('Delete all data?')) { transactions = []; updateUI(); } }
        function viewImage(src) { document.getElementById('modalImg').src = src; document.getElementById('modal').style.display = 'flex'; }
        function downloadExcel() {
            let csv = "Date,Type,Description,Amount\n";
            transactions.forEach(t => csv += `${t.date},${t.type},"${t.description.replace(/"/g, '""')}",${t.amount}\n`);
            const link = document.createElement("a");
            link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
            link.download = "AK_Beauty_Report.csv";
            link.click();
        }

        document.getElementById('financeForm').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('receipt').files[0];
            let base64 = null;
            if(file) base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
            transactions.push({ id: Date.now(), date: document.getElementById('txDate').value, type: document.getElementById('type').value, amount: parseFloat(document.getElementById('amount').value), description: document.getElementById('description').value, receipt: base64 });
            updateUI(); e.target.reset(); setToday();
        };

        function setToday() { document.getElementById('txDate').value = new Date().toISOString().split('T')[0]; }
        setToday(); updateUI(); lucide.createIcons();
    </script>
</body>
</html>
